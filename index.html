<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>차트의 품격 고객센터</title>

<!-- 한글 폰트(Pretendard) -->
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

<style>
  :root{
    --bg:        #0f1c2e;   /* 전체 배경(짙은 네이비) */
    --panel:     #ffffff;   /* 채팅 영역 배경 */
    --header:    #102a43;   /* 상단 헤더 */
    --accent:    #1f6feb;   /* 포인트 색(파랑) */
    --accent-2:  #163b66;
    --bot-bub:   #f1f4f9;   /* 봇 말풍선 */
    --bot-text:  #1b2733;
    --user-bub:  #1f6feb;   /* 회원 선택 말풍선 */
    --user-text: #ffffff;
    --muted:     #6b7a8d;
    --line:      #e6ebf2;
    --btn-bg:    #ffffff;
    --btn-line:  #cfd9e6;
    --btn-text:  #1b3a5c;
    --shadow:    0 10px 40px rgba(8,20,40,.28);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, #1b3556 0%, transparent 60%),
      radial-gradient(900px 500px at -10% 110%, #14375f 0%, transparent 55%),
      var(--bg);
    color:var(--bot-text);
    display:flex; align-items:center; justify-content:center;
    min-height:100dvh; padding:0;
  }

  /* 휴대폰 형태의 채팅 카드 */
  .app{
    width:100%; max-width:430px; height:100dvh; max-height:860px;
    background:var(--panel);
    display:flex; flex-direction:column;
    overflow:hidden; box-shadow:var(--shadow);
    border-radius:0;
  }
  @media (min-width:480px){ .app{ border-radius:22px; height:92dvh; } }

  /* 헤더 */
  .head{
    background:linear-gradient(135deg,var(--header),#0c2238);
    color:#fff; padding:16px 18px; display:flex; align-items:center; gap:12px;
    flex:0 0 auto;
  }
  .logo{
    width:42px; height:42px; border-radius:12px; flex:0 0 auto;
    background:linear-gradient(135deg,var(--accent),#5aa0ff);
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:16px; letter-spacing:.5px;
    box-shadow:0 4px 14px rgba(31,111,235,.5);
  }
  .head .title{font-weight:800; font-size:16px; line-height:1.2;}
  .head .status{font-size:12px; color:#9fc0ea; display:flex; align-items:center; gap:6px; margin-top:3px;}
  .dot{width:7px; height:7px; border-radius:50%; background:#34d27b; box-shadow:0 0 0 3px rgba(52,210,123,.25);}

  /* 대화 영역 */
  .chat{
    flex:1 1 auto; overflow-y:auto; padding:18px 14px 8px;
    background:
      linear-gradient(180deg,#fbfcfe,#f5f8fc);
    scroll-behavior:smooth;
  }
  .row{display:flex; margin-bottom:12px; animation:rise .28s ease both;}
  .row.bot{justify-content:flex-start;}
  .row.user{justify-content:flex-end;}
  @keyframes rise{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}

  .avatar{
    width:32px; height:32px; border-radius:50%; flex:0 0 auto; margin-right:8px;
    background:linear-gradient(135deg,var(--accent),#5aa0ff); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800;
  }
  .bubble{
    max-width:78%; padding:11px 14px; border-radius:16px; font-size:14.5px; line-height:1.55;
    white-space:pre-wrap; word-break:break-word;
  }
  .bot .bubble{background:var(--bot-bub); color:var(--bot-text); border-top-left-radius:5px;}
  .user .bubble{background:var(--user-bub); color:var(--user-text); border-top-right-radius:5px;}

  /* 선택 버튼 */
  .options{display:flex; flex-direction:column; gap:9px; padding:2px 6px 16px 46px; animation:rise .3s ease both;}
  .opt{
    text-align:left; width:100%; padding:13px 15px; border-radius:13px;
    border:1.5px solid var(--btn-line); background:var(--btn-bg); color:var(--btn-text);
    font-size:14.5px; font-weight:600; font-family:inherit; cursor:pointer;
    transition:.15s; display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .opt:hover{border-color:var(--accent); color:var(--accent); transform:translateY(-1px);}
  .opt:active{transform:scale(.99);}
  .opt .arrow{color:var(--btn-line); font-size:16px; transition:.15s;}
  .opt:hover .arrow{color:var(--accent); transform:translateX(2px);}
  .opt.nav{background:#eef3fb; border-color:transparent; color:var(--accent-2); font-weight:700;}
  .opt.contact{background:linear-gradient(135deg,var(--accent),#3a86ff); color:#fff; border-color:transparent;}
  .opt.contact .arrow{color:rgba(255,255,255,.8);}
  .opt.allguide{background:linear-gradient(135deg,var(--header),#0c2238); color:#fff; border-color:transparent; font-weight:700;}
  .opt.allguide .arrow{color:rgba(255,255,255,.8);}

  /* 입력창(현재는 안내용/비활성 — 2단계에서 활성화 예정) */
  .foot{
    flex:0 0 auto; padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line); background:#fff;
    display:flex; align-items:center; gap:10px;
  }
  .foot .fake-input{
    flex:1; background:#f1f4f9; border-radius:22px; padding:11px 16px;
    color:#9aa7b6; font-size:13.5px;
  }
  .foot .send{
    width:40px; height:40px; border-radius:50%; flex:0 0 auto; border:none;
    background:#dfe6ef; color:#9aa7b6; font-size:17px; cursor:not-allowed;
  }

  /* 입력 표시(봇이 입력 중...) */
  .typing{display:flex; gap:4px; padding:13px 16px;}
  .typing span{width:7px; height:7px; border-radius:50%; background:#b7c2d0; animation:blink 1.2s infinite both;}
  .typing span:nth-child(2){animation-delay:.2s;}
  .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.3; transform:scale(.8);} 40%{opacity:1; transform:scale(1);}}

  .chat::-webkit-scrollbar{width:6px;}
  .chat::-webkit-scrollbar-thumb{background:#d2dbe6; border-radius:3px;}
  .bubble.imgbubble{padding:6px;display:flex;flex-direction:column;gap:7px;max-width:82%;}
  .guide-img{width:100%;height:auto;border-radius:9px;display:block;border:1px solid #e5e8f0;cursor:zoom-in;}
</style>
</head>
<body>

<div class="app">
  <div class="head">
    <div class="logo">RS</div>
    <div>
      <div class="title">차트의 품격 고객센터</div>
      <div class="status"><span class="dot"></span>자주 묻는 질문 안내봇</div>
    </div>
  </div>

  <div class="chat" id="chat"></div>

  <!-- 입력창: 지금은 버튼식이라 비활성 상태입니다. (3단계에서 직접 입력 기능을 켤 자리) -->
  <div class="foot">
    <div class="fake-input">버튼을 눌러 문의 내용을 선택해 주세요</div>
    <button class="send" disabled>➤</button>

</div>

/* ===== 가이드 PDF 다운로드 =====
   각 PDF는 이 HTML 파일과 '같은 폴더(같은 GitHub 위치)'에 함께 올려야 다운로드됩니다.
   파일을 바꾸려면 각 버튼의 pdf 값(파일명)만 수정하면 됩니다. */
function downloadFile(filename, saveName){
  const a = document.createElement("a");
  a.href = filename;
  a.download = saveName || filename;
  document.body.appendChild(a); a.click(); a.remove();
}

/* 내장(base64) PDF를 새 창으로 열기. 막히면 다운로드로 폴백 */
function openEmbeddedPdf(b64, saveName){
  try{
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
    const url = URL.createObjectURL(new Blob([bytes], {type:"application/pdf"}));
    const w = window.open(url, "_blank");
    if(!w){
      const a = document.createElement("a");
      a.href = url; a.download = saveName || "guide.pdf";
      document.body.appendChild(a); a.click(); a.remove();
    }
    setTimeout(()=> URL.revokeObjectURL(url), 60000);
  }catch(e){
    addBotBubble("PDF를 여는 중 문제가 발생했어요. 관리자에게 문의 부탁드립니다.");
  }
}

const chat = document.getElementById("chat");

function scrollDown(){ chat.scrollTop = chat.scrollHeight; }

function addBotBubble(text){
  const row = document.createElement("div");
  row.className = "row bot";
  row.innerHTML = `<div class="avatar">RS</div><div class="bubble"></div>`;
  row.querySelector(".bubble").textContent = text;
  chat.appendChild(row);
  scrollDown();
}

function addBotImages(imgs){
  const row = document.createElement("div");
  row.className = "row bot";
  let html = `<div class="avatar">RS</div><div class="bubble imgbubble">`;
  imgs.forEach(src=>{
    html += `<a href="img/${src}" target="_blank" rel="noopener"><img class="guide-img" src="img/${src}" loading="lazy" alt="안내 이미지"></a>`;
  });
  html += `</div>`;
  row.innerHTML = html;
  chat.appendChild(row);
  scrollDown();
}

function addUserBubble(text){
  const row = document.createElement("div");
  row.className = "row user";
  row.innerHTML = `<div class="bubble"></div>`;
  row.querySelector(".bubble").textContent = text;
  chat.appendChild(row);
  scrollDown();
}

function showTyping(){
  const row = document.createElement("div");
  row.className = "row bot";
  row.id = "typing";
  row.innerHTML = `<div class="avatar">RS</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(row);
  scrollDown();
}
function hideTyping(){
  const t = document.getElementById("typing");
  if(t) t.remove();
}

function addOptions(options){
  const box = document.createElement("div");
  box.className = "options";
  box.id = "live-options";
  options.forEach(o=>{
    const b = document.createElement("button");
    b.className = "opt" + (o.style ? " " + o.style : "");
    b.innerHTML = `<span>${o.label}</span><span class="arrow">›</span>`;
    b.onclick = ()=> choose(o);
    box.appendChild(b);
  });
  chat.appendChild(box);
  scrollDown();
}

function clearOptions(){
  const old = document.getElementById("live-options");
  if(old) old.remove();
}

function goto(id){
  const node = FAQ[id];
  if(!node){ addBotBubble("죄송합니다. 해당 항목을 찾을 수 없어요. 관리자에게 문의 부탁드립니다."); return; }
  clearOptions();
  showTyping();
  setTimeout(()=>{
    hideTyping();
    addBotBubble(node.msg);
    if(node.img && node.img.length){ addBotImages(node.img); }
    setTimeout(()=> addOptions(node.options), 120);
  }, 420);
}

function choose(opt){
  // 내장 PDF 열기 (HTML에 포함된 데이터)
  if(opt.embedPdf){
    openEmbeddedPdf(opt.embedPdf, opt.pdfName);
    addBotBubble("회원가입 가이드 PDF를 여는 중입니다. 새 창이 안 뜨면 다운로드 폴더를 확인해 주세요. 📄");
    return;
  }
  // 외부 링크(카카오톡 채팅 등) 새 창으로 열기
  if(opt.url){
    window.open(opt.url, "_blank", "noopener");
    return;
  }
  // PDF 다운로드 (같은 폴더의 PDF 파일을 내려받음)
  if(opt.pdf){
    downloadFile(opt.pdf, opt.pdfName);
    addBotBubble("PDF 다운로드를 시작합니다. 저장 창이 안 뜨면 버튼을 한 번 더 눌러주세요. 📄");
    return;
  }
  clearOptions();
  // '처음으로' / '뒤로' 같은 이동 버튼은 회원 말풍선을 띄우지 않음
  const isNav = opt.style === "nav";
  if(!isNav){
    const clean = opt.label.replace(/^[^\uAC00-\uD7A3a-zA-Z0-9]+/, "").trim();
    addUserBubble(clean || opt.label);
  }
  goto(opt.goto);
}
