<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>RS Finance 고객센터</title>

<!-- 한글 폰트(Pretendard) -->
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

<style>
  :root{
    --bg:        #0f1c2e;   /* 전체 배경(짙은 네이비) */
    --panel:     #ffffff;   /* 채팅 영역 배경 */
    --header:    #102a43;   /* 상단 헤더 */
    --accent:    #1f6feb;   /* 포인트 색(파랑) */
    --accent-2:  #163b66;
    --bot-bub:   #f1f4f9;   /* 봇 말풍선 */
    --bot-text:  #1b2733;
    --user-bub:  #1f6feb;   /* 회원 선택 말풍선 */
    --user-text: #ffffff;
    --muted:     #6b7a8d;
    --line:      #e6ebf2;
    --btn-bg:    #ffffff;
    --btn-line:  #cfd9e6;
    --btn-text:  #1b3a5c;
    --shadow:    0 10px 40px rgba(8,20,40,.28);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, #1b3556 0%, transparent 60%),
      radial-gradient(900px 500px at -10% 110%, #14375f 0%, transparent 55%),
      var(--bg);
    color:var(--bot-text);
    display:flex; align-items:center; justify-content:center;
    min-height:100dvh; padding:0;
  }

  /* 휴대폰 형태의 채팅 카드 */
  .app{
    width:100%; max-width:430px; height:100dvh; max-height:860px;
    background:var(--panel);
    display:flex; flex-direction:column;
    overflow:hidden; box-shadow:var(--shadow);
    border-radius:0;
  }
  @media (min-width:480px){ .app{ border-radius:22px; height:92dvh; } }

  /* 헤더 */
  .head{
    background:linear-gradient(135deg,var(--header),#0c2238);
    color:#fff; padding:16px 18px; display:flex; align-items:center; gap:12px;
    flex:0 0 auto;
  }
  .logo{
    width:42px; height:42px; border-radius:12px; flex:0 0 auto;
    background:linear-gradient(135deg,var(--accent),#5aa0ff);
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:16px; letter-spacing:.5px;
    box-shadow:0 4px 14px rgba(31,111,235,.5);
  }
  .head .title{font-weight:800; font-size:16px; line-height:1.2;}
  .head .status{font-size:12px; color:#9fc0ea; display:flex; align-items:center; gap:6px; margin-top:3px;}
  .dot{width:7px; height:7px; border-radius:50%; background:#34d27b; box-shadow:0 0 0 3px rgba(52,210,123,.25);}

  /* 대화 영역 */
  .chat{
    flex:1 1 auto; overflow-y:auto; padding:18px 14px 8px;
    background:
      linear-gradient(180deg,#fbfcfe,#f5f8fc);
    scroll-behavior:smooth;
  }
  .row{display:flex; margin-bottom:12px; animation:rise .28s ease both;}
  .row.bot{justify-content:flex-start;}
  .row.user{justify-content:flex-end;}
  @keyframes rise{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}

  .avatar{
    width:32px; height:32px; border-radius:50%; flex:0 0 auto; margin-right:8px;
    background:linear-gradient(135deg,var(--accent),#5aa0ff); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800;
  }
  .bubble{
    max-width:78%; padding:11px 14px; border-radius:16px; font-size:14.5px; line-height:1.55;
    white-space:pre-wrap; word-break:break-word;
  }
  .bot .bubble{background:var(--bot-bub); color:var(--bot-text); border-top-left-radius:5px;}
  .user .bubble{background:var(--user-bub); color:var(--user-text); border-top-right-radius:5px;}

  /* 선택 버튼 */
  .options{display:flex; flex-direction:column; gap:9px; padding:2px 6px 16px 46px; animation:rise .3s ease both;}
  .opt{
    text-align:left; width:100%; padding:13px 15px; border-radius:13px;
    border:1.5px solid var(--btn-line); background:var(--btn-bg); color:var(--btn-text);
    font-size:14.5px; font-weight:600; font-family:inherit; cursor:pointer;
    transition:.15s; display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .opt:hover{border-color:var(--accent); color:var(--accent); transform:translateY(-1px);}
  .opt:active{transform:scale(.99);}
  .opt .arrow{color:var(--btn-line); font-size:16px; transition:.15s;}
  .opt:hover .arrow{color:var(--accent); transform:translateX(2px);}
  .opt.nav{background:#eef3fb; border-color:transparent; color:var(--accent-2); font-weight:700;}
  .opt.contact{background:linear-gradient(135deg,var(--accent),#3a86ff); color:#fff; border-color:transparent;}
  .opt.contact .arrow{color:rgba(255,255,255,.8);}

  /* 입력창(현재는 안내용/비활성 — 2단계에서 활성화 예정) */
  .foot{
    flex:0 0 auto; padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line); background:#fff;
    display:flex; align-items:center; gap:10px;
  }
  .foot .fake-input{
    flex:1; background:#f1f4f9; border-radius:22px; padding:11px 16px;
    color:#9aa7b6; font-size:13.5px;
  }
  .foot .send{
    width:40px; height:40px; border-radius:50%; flex:0 0 auto; border:none;
    background:#dfe6ef; color:#9aa7b6; font-size:17px; cursor:not-allowed;
  }

  /* 입력 표시(봇이 입력 중...) */
  .typing{display:flex; gap:4px; padding:13px 16px;}
  .typing span{width:7px; height:7px; border-radius:50%; background:#b7c2d0; animation:blink 1.2s infinite both;}
  .typing span:nth-child(2){animation-delay:.2s;}
  .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.3; transform:scale(.8);} 40%{opacity:1; transform:scale(1);}}

  .chat::-webkit-scrollbar{width:6px;}
  .chat::-webkit-scrollbar-thumb{background:#d2dbe6; border-radius:3px;}
</style>
</head>
<body>

<div class="app">
  <div class="head">
    <div class="logo">RS</div>
    <div>
      <div class="title">RS Finance 고객센터</div>
      <div class="status"><span class="dot"></span>자주 묻는 질문 안내봇</div>
    </div>
  </div>

  <div class="chat" id="chat"></div>

  <!-- 입력창: 지금은 버튼식이라 비활성 상태입니다. (3단계에서 직접 입력 기능을 켤 자리) -->
  <div class="foot">
    <div class="fake-input">버튼을 눌러 문의 내용을 선택해 주세요</div>
    <button class="send" disabled>➤</button>
  </div>
</div>

<script>
/* ============================================================
   ⬇⬇⬇  여기만 고치면 됩니다 (FAQ 내용)  ⬇⬇⬇
   ------------------------------------------------------------
   - 각 항목은 { msg: 봇이 하는 말, options: 버튼목록 } 구조예요.
   - 버튼: { label:"버튼에 보일 글자", goto:"이동할 항목 id" }
   - 답변을 고치려면 해당 항목의 msg 만 바꾸면 됩니다.
   - 질문(버튼)을 추가하려면: ① 메뉴의 options 에 버튼 한 줄 추가
                              ② 아래에 새 항목 id 를 하나 만들기
   - 줄바꿈은 \n 으로 합니다.
   ============================================================ */

const FAQ = {

  /* ---------- 시작 화면 ---------- */
  home: {
    msg: "안녕하세요! RS Finance 고객센터입니다 😊\n무엇을 도와드릴까요? 아래에서 선택해 주세요.",
    options: [
      { label: "📝  회원가입 방법",       goto: "signup" },
      { label: "💳  입금 · 출금",        goto: "deposit" },
      { label: "🧾  계좌 개설 · 로그인",  goto: "account" },
      { label: "🙋  관리자에게 문의",     goto: "contact", style: "contact" },
    ],
  },

  /* ---------- 회원가입 ----------

  signup: {
    msg: "RS Finance 회원가입은 다음 순서로 진행됩니다.\n① 홈페이지 등록 → ② 정보 입력 → ③ 신원인증(KYC) → ④ 주소 인증 → ⑤ 약관 동의·완료 → ⑥ 금융정보 입력 → ⑦ 금융정보 승인 → ⑧ MT 계좌 개설 → ⑨ 계좌 목록·비밀번호 설정\n\n궁금하신 단계를 선택해 주세요. (1번부터 순서대로 보셔도 됩니다)",

      { label: "3. 신원인증(KYC) 서류 업로드",   goto: "su_3" },
      { label: "4. 주소 인증",                  goto: "su_4" },
      { label: "5. 약관 동의 후 완료",           goto: "su_5" },
      { label: "6. 금융정보 입력",              goto: "su_6" },
      { label: "7. 금융정보 승인 요청",          goto: "su_7" },
      { label: "8. MT 계좌 개설",               goto: "su_8" },
      { label: "9. 계좌 목록 · 비밀번호 설정",    goto: "su_9" },
      { label: "📄  회원가입 가이드 PDF 받기",    goto: "su_pdf" },

    options: [
      { label: "다음 ▶  정보 입력",      goto: "su_2", style: "nav" },
      { label: "↩  회원가입 메뉴로",     goto: "signup", style: "nav" },
    ],
  },
  su_2: {
    msg: "[2단계] 정보 입력 · 이메일 인증\n\n아래 정보를 입력해 주세요.\n• 이름 / 성: 한글로 입력해 주세요\n• 이메일 주소\n• 전화번호 (+82)\n• 비밀번호: 숫자·대문자·소문자·특수문자 포함 8자 이상\n\n'전송'을 누르면 입력하신 이메일로 인증번호가 발송됩니다.\n(메일 제목: 'RS 파이낸스 | CRM 회원가입 완료 안내')\n인증번호를 입력한 뒤 '제출하기'를 클릭하세요.",
    options: [
      { label: "다음 ▶  신원인증(KYC)",  goto: "su_3", style: "nav" },
      { label: "↩  회원가입 메뉴로",     goto: "signup", style: "nav" },
    ],
  },
  su_3: {
    msg: "[3단계] 신원인증(KYC) 서류 업로드\n\n로그인 후 화면 우측 상단의 '이메일 > 개인 설정'을 클릭하면 KYC 서류를 업로드할 수 있습니다.\n\n📄 신분증 업로드\n• 주민등록증 또는 운전면허증의 앞·뒷면을 업로드\n• 여권은 같은 이미지를 앞·뒷면에 두 번 중복 업로드\n• 증명서 번호: 주민등록번호 또는 운전면허증 등록번호 입력",
    options: [
      { label: "다음 ▶  주소 인증",      goto: "su_4", style: "nav" },
      { label: "↩  회원가입 메뉴로",     goto: "signup", style: "nav" },
    ],
  },
  su_4: {
    msg: "[4단계] 주소 인증\n\n• 업로드한 신분증에 기재된 주소를 입력하세요. (거주 국가, 도시, 우편번호, 상세주소)\n• 주소지가 기재된 서류를 업로드하세요. (주민등록증·운전면허증·등본 등)\n   └ 신원인증 때 올린 서류와 동일해도 됩니다.\n   └ ⚠ 여권으로 인증한 경우, 주소 서류는 '등본'을 업로드하세요.\n\n※ 파일은 pdf·jpg·jpeg·png 형식, 10MB 이하\n입력 후 '다음 단계'를 클릭하세요.",
    options: [
      { label: "다음 ▶  약관 동의·완료", goto: "su_5", style: "nav" },
      { label: "↩  회원가입 메뉴로",     goto: "signup", style: "nav" },
    ],
  },
  su_5: {
    msg: "[5단계] 약관 동의 후 완료\n\n명세서(이용자 약관 · 위험 고지문 · 개인정보 처리방침)를 확인하고 동의에 체크한 뒤 '완료'를 클릭하면 신청이 끝납니다.\n\n※ 만 18세 이상이며, 미국 시민 또는 미국 세무 거주자가 아니어야 가입하실 수 있습니다.\n\n✅ 신원인증(KYC)과 주소 등록까지 모두 마치셨다면, 매니저에게 승인을 요청해 주세요.\n가입하신 이메일 주소와 함께 '승인요청'을 보내주시면 됩니다.\n매니저 승인이 완료되어야 신원인증이 최종 완료됩니다.",
    options: [
      { label: "다음 ▶  금융정보 입력",   goto: "su_6", style: "nav" },

  },
  su_6: {

  },

  su_8: {

      { label: "🙋  관리자 문의",  goto: "contact", style: "contact" },

  su_9: {
    msg: "[9단계] 계좌 목록 · MT 비밀번호 설정\n\n계좌 개설 후, 왼쪽 메뉴에서 '계좌 목록'을 클릭하세요.\n\n🔑 MT5 로그인 정보 만들기\n• 목록에 표시된 MT 계좌의 7자리 번호가 'MT5 로그인 번호'입니다.\n• 계좌 오른쪽의 🔒 자물쇠 아이콘을 클릭하면 'MT 비밀번호 변경' 창이 열립니다.\n• MT 새 비밀번호를 입력하세요. (대문자·소문자·숫자·특수문자 포함)\n• '확인'을 클릭하면 비밀번호 설정이 완료됩니다.\n\n이제 이 로그인 번호와 비밀번호로 MetaTrader 5에 로그인하실 수 있습니다. 🎉",
    options: [
      { label: "↩  처음으로",     goto: "home", style: "nav" },
      { label: "🙋  관리자 문의",  goto: "contact", style: "contact" },
    ],
  },
  su_pdf: {
    msg: "회원가입 가이드를 PDF로 받으실 수 있어요.\n아래 '📥 PDF 다운로드' 버튼을 누르면 다운로드가 시작됩니다.",
    options: [

function downloadFile(filename, saveName){
  const a = document.createElement("a");
  a.href = filename;
  a.download = saveName || filename;
  document.body.appendChild(a); a.click(); a.remove();
}

  const row = document.createElement("div");
  row.className = "row bot";
  row.innerHTML = `<div class="avatar">RS</div><div class="bubble"></div>`;
  row.querySelector(".bubble").textContent = text;
  chat.appendChild(row);
  scrollDown();
}

function addUserBubble(text){
  const row = document.createElement("div");
  row.className = "row user";
  row.innerHTML = `<div class="bubble"></div>`;
  row.querySelector(".bubble").textContent = text;
  chat.appendChild(row);
  scrollDown();
}

function showTyping(){
  const row = document.createElement("div");
  row.className = "row bot";
  row.id = "typing";
  row.innerHTML = `<div class="avatar">RS</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(row);
  scrollDown();
}
function hideTyping(){
  const t = document.getElementById("typing");
  if(t) t.remove();
}

function addOptions(options){
  const box = document.createElement("div");
  box.className = "options";
  box.id = "live-options";
  options.forEach(o=>{
    const b = document.createElement("button");
    b.className = "opt" + (o.style ? " " + o.style : "");
    b.innerHTML = `<span>${o.label}</span><span class="arrow">›</span>`;
    b.onclick = ()=> choose(o);
    box.appendChild(b);
  });
  chat.appendChild(box);
  scrollDown();
}

function clearOptions(){
  const old = document.getElementById("live-options");
  if(old) old.remove();
}

function goto(id){
  const node = FAQ[id];
  if(!node){ addBotBubble("죄송합니다. 해당 항목을 찾을 수 없어요. 관리자에게 문의 부탁드립니다."); return; }
  clearOptions();
  showTyping();
  setTimeout(()=>{
    hideTyping();
    addBotBubble(node.msg);
    setTimeout(()=> addOptions(node.options), 120);
  }, 420);
}

function choose(opt){
  // 외부 링크(카카오톡 채팅 등) 새 창으로 열기
  if(opt.url){
    window.open(opt.url, "_blank", "noopener");
    return;
  }
  // PDF 다운로드 (같은 폴더의 PDF 파일을 내려받음)
  if(opt.pdf){
    downloadFile(opt.pdf, opt.pdfName);
    addBotBubble("PDF 다운로드를 시작합니다. 저장 창이 안 뜨면 버튼을 한 번 더 눌러주세요. 📄");
    return;
  }
  clearOptions();
  // '처음으로' / '뒤로' 같은 이동 버튼은 회원 말풍선을 띄우지 않음
  const isNav = opt.style === "nav";
  if(!isNav){
    const clean = opt.label.replace(/^[^\uAC00-\uD7A3a-zA-Z0-9]+/, "").trim();
    addUserBubble(clean || opt.label);
  }
  goto(opt.goto);
}

/* 시작 */
window.addEventListener("load", ()=> goto("home"));
</script>
</body>
</html>
